    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔳</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        /* ===== CSS Variables ===== */
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #1a202c;
            --text-secondary: #4a5568;
            --border: #e2e8f0;
            --primary: #6c5ce7;
            --primary-hover: #5a4bd1;
            --primary-light: #f0eeff;
            --shadow: 0 4px 24px rgba(0,0,0,.06);
            --radius: 16px;
            --radius-sm: 10px;
        }

        /* Dark mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --text: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --primary-light: #1e1b4b;
                --shadow: 0 4px 24px rgba(0,0,0,.3);
            }
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background .3s, color .3s;
        }

        /* ===== Header ===== */
        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .logo span { background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header nav { display: flex; gap: 8px; }
        header nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            transition: background .2s, color .2s;
        }
        header nav a:hover { background: var(--primary-light); color: var(--primary); }

        /* ===== Container ===== */
        .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; flex: 1; }

        /* ===== Hero ===== */
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .hero h1 span { background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-secondary); font-size: 16px; max-width: 500px; margin: 0 auto; line-height: 1.6; }

        /* ===== Main Card ===== */
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 32px;
            align-items: start;
        }
        @media (max-width: 720px) {
            .main-card { grid-template-columns: 1fr; }
        }

        /* ===== Input Section ===== */
        .input-section { display: flex; flex-direction: column; gap: 16px; }

        .type-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .type-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all .2s;
        }
        .type-btn:hover { border-color: var(--primary); color: var(--primary); }
        .type-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .input-group input, .input-group textarea {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: var(--bg);
            color: var(--text);
            transition: border-color .2s;
            outline: none;
            font-family: inherit;
            resize: vertical;
        }
        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--primary);
        }
        .input-group textarea { min-height: 80px; }

        .extra-fields { display: flex; flex-direction: column; gap: 12px; }
        .extra-fields .input-group { display: none; }
        .extra-fields .input-group.visible { display: flex; }
        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* ===== Options Row ===== */
        .options-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .options-row .input-group { flex-direction: row; align-items: center; gap: 8px; }
        .options-row label { font-size: 13px; }
        .options-row select, .options-row input[type="color"] {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
        }
        .options-row input[type="color"] {
            width: 40px;
            height: 36px;
            padding: 2px;
        }

        .generate-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }
        .generate-btn:hover { opacity: .9; }
        .generate-btn:active { transform: scale(.98); }

        /* ===== QR Output ===== */
        .output-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }
        .qr-box {
            width: 100%;
            aspect-ratio: 1;
            max-width: 280px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--border);
            position: relative;
            overflow: hidden;
        }
        .qr-box canvas, .qr-box img {
            max-width: 100%;
            max-height: 100%;
        }
        .qr-placeholder {
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }
        .qr-placeholder .icon { font-size: 48px; margin-bottom: 8px; opacity: .4; }

        .download-btn {
            padding: 12px 24px;
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--primary);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .download-btn.visible { display: inline-flex; }
        .download-btn:hover { background: var(--primary); color: #fff; }
        #download-svg-btn { margin-top: -8px; }

        /* ===== Features ===== */
        .features {
            margin-top: 48px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .feature-card {
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .feature-card .icon { font-size: 32px; margin-bottom: 10px; }
        .feature-card h3 { font-size: 16px; margin-bottom: 6px; }
        .feature-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

        /* ===== Footer ===== */
        footer {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 13px;
            border-top: 1px solid var(--border);
            margin-top: 20px;
            background: var(--card-bg);
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            opacity: 0;
            transition: all .3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

<div class="toast" id="toast"></div>

<script>
    (function() {
        'use strict';

        // ===== Check QRCode library loaded =====
        if (typeof QRCode === 'undefined') {
            document.getElementById('generate-btn').textContent = '❌ 库加载失败，请刷新页面';
            document.getElementById('generate-btn').disabled = true;
            console.error('QRCode library failed to load from CDN');
            return;
        }

        // ===== DOM refs =====
        const typeBtns = document.querySelectorAll('.type-btn');
        const urlInput = document.getElementById('url-input');
        const textInput = document.getElementById('text-input');
        const wifiSSID = document.getElementById('wifi-ssid');
        const wifiPass = document.getElementById('wifi-password');
        const wifiEnc = document.getElementById('wifi-encryption');
        const vcardName = document.getElementById('vcard-name');
        const vcardPhone = document.getElementById('vcard-phone');
        const vcardEmail = document.getElementById('vcard-email');
        const vcardOrg = document.getElementById('vcard-org');
        const sizeSelect = document.getElementById('qr-size');
        const ecSelect = document.getElementById('qr-ec');
        const colorInput = document.getElementById('qr-color');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const downloadSvgBtn = document.getElementById('download-svg-btn');
        const canvas = document.getElementById('qr-canvas');
        const placeholder = document.getElementById('qr-placeholder');
        const toast = document.getElementById('toast');
        const logoInput = document.getElementById('logo-input');
        const logoBtn = document.getElementById('logo-btn');
        const logoName = document.getElementById('logo-name');
        const logoRemove = document.getElementById('logo-remove');

        let currentType = 'url';
        let lastDataUrl = '';
        let logoDataUrl = '';
        let logoImg = null;

        // ===== Type switching =====
        typeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                typeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                // Show/hide fields
                document.querySelectorAll('.input-group[data-for]').forEach(el => {
                    el.style.display = el.dataset.for === currentType ? 'flex' : 'none';
                });
                document.querySelectorAll('.extra-fields').forEach(el => {
                    el.style.display = el.dataset.for === currentType ? 'flex' : 'none';
                });
            });
        });

        // ===== Logo upload =====
        logoBtn.addEventListener('click', () => logoInput.click());

        logoInput.addEventListener('change', () => {
            const file = logoInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                logoDataUrl = e.target.result;
                logoName.textContent = file.name;
                logoRemove.style.display = 'inline';
                showToast('✅ Logo 已添加');
            };
            reader.readAsDataURL(file);
        });

        logoRemove.addEventListener('click', () => {
            logoDataUrl = '';
            logoImg = null;
            logoInput.value = '';
            logoName.textContent = '';
            logoRemove.style.display = 'none';
            showToast('Logo 已移除');
        });

        // ===== Generate =====
        function getContent() {
            switch (currentType) {
                case 'url':
                    const url = urlInput.value.trim();
                    if (!url) { showToast('请输入网址'); return ''; }
                    if (!/^https?:\/\//i.test(url)) return 'https://' + url;
                    return url;
                case 'text':
                    const txt = textInput.value.trim();
                    if (!txt) { showToast('请输入文本内容'); return ''; }
                    return txt;
                case 'wifi':
                    const ssid = wifiSSID.value.trim();
                    if (!ssid) { showToast('请输入 WiFi 名称'); return ''; }
                    const enc = wifiEnc.value;
                    const pass = wifiPass.value.trim();
                    if (enc === 'nopass') return `WIFI:T:nopass;S:${ssid};;`;
                    return `WIFI:T:${enc};S:${ssid};P:${pass};;`;
                case 'vcard':
                    const name = vcardName.value.trim();
                    if (!name) { showToast('请输入姓名'); return ''; }
                    const phone = vcardPhone.value.trim();
                    const email = vcardEmail.value.trim();
                    const org = vcardOrg.value.trim();
                    let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
                    vcard += `FN:${name}\nN:${name};;;\n`;
                    if (phone) vcard += `TEL;TYPE=CELL:${phone}\n`;
                    if (email) vcard += `EMAIL:${email}\n`;
                    if (org) vcard += `ORG:${org}\n`;
                    vcard += 'END:VCARD';
                    return vcard;
                default:
                    return '';
            }
        }

        function generateQR() {
            const content = getContent();
            if (!content) return;

            const size = parseInt(sizeSelect.value, 10);
            const ec = ecSelect.value;

            // Show loading in placeholder
            placeholder.innerHTML = '<div class="icon">⏳</div><div>生成中…</div>';
            placeholder.style.display = 'flex';

            // Configure colors
            const darkColor = colorInput.value;
            const lightColor = '#ffffff';

            QRCode.toCanvas(
                canvas,
                content,
                {
                    width: size,
                    margin: 2,
                    color: {
                        dark: darkColor,
                        light: lightColor,
                    },
                    errorCorrectionLevel: logoDataUrl ? 'H' : ec,
                },
                function (error) {
                    if (error) {
                        console.error(error);
                        placeholder.innerHTML = '<div class="icon">❌</div><div>生成失败，请重试</div>';
                        placeholder.style.display = 'flex';
                        canvas.style.display = 'none';
                        downloadBtn.classList.remove('visible');
                        downloadSvgBtn.classList.remove('visible');
                        return;
                    }

                    // Draw logo overlay if present
                    if (logoDataUrl) {
                        drawLogoOnCanvas(canvas, logoDataUrl, function () {
                            finishGeneration();
                        });
                    } else {
                        finishGeneration();
                    }
                }
            );

            function finishGeneration() {
                // Scale canvas to display size while keeping resolution
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.display = 'block';
                placeholder.style.display = 'none';
                lastDataUrl = canvas.toDataURL('image/png');
                downloadBtn.classList.add('visible');
                // SVG download only available without logo
                if (!logoDataUrl) {
                    downloadSvgBtn.classList.add('visible');
                } else {
                    downloadSvgBtn.classList.remove('visible');
                }
                showToast('✅ 二维码生成成功！');
            }
        }

        function drawLogoOnCanvas(cvs, dataUrl, cb) {
            const ctx = cvs.getContext('2d');
            const img = new Image();
            img.onload = function () {
                const logoSize = cvs.width * 0.22;
                const x = (cvs.width - logoSize) / 2;
                const y = (cvs.height - logoSize) / 2;
                // White background for logo
                const pad = logoSize * 0.08;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x - pad, y - pad, logoSize + pad * 2, logoSize + pad * 2);
                // Draw logo
                ctx.drawImage(img, x, y, logoSize, logoSize);
                cb();
            };
            img.onerror = function () {
                showToast('⚠️ Logo 图片加载失败');
                cb();
            };
            img.src = dataUrl;
        }

        generateBtn.addEventListener('click', generateQR);

        // Enter key in inputs
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('keydown', e => {
                if (e.key === 'Enter' && el.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    generateQR();
                }
            });
        });

        // ===== Download PNG =====
        downloadBtn.addEventListener('click', () => {
            if (!lastDataUrl) return;
            const link = document.createElement('a');
            link.download = `qrcode-${Date.now()}.png`;
            link.href = lastDataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast('✅ PNG 下载成功！');
        });

        // ===== Download SVG =====
        downloadSvgBtn.addEventListener('click', () => {
            const content = getContent();
            if (!content) return;
            const size = parseInt(sizeSelect.value, 10);
            const darkColor = colorInput.value;
            QRCode.toString(content, {
                type: 'svg',
                width: size,
                margin: 2,
                color: { dark: darkColor, light: '#ffffff' },
                errorCorrectionLevel: ecSelect.value
            }, function (err, svgStr) {
                if (err) { showToast('❌ SVG 生成失败'); return; }
                const blob = new Blob([svgStr], { type: 'image/svg+xml' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `qrcode-${Date.now()}.svg`;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('✅ SVG 下载成功！');
            });
        });

        // ===== Toast =====
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ===== Auto-generate on first load =====
        setTimeout(generateQR, 300);
    })();
</script>

</body>
</html>
