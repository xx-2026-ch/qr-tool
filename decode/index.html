    <section style="margin-top:40px">
        <h2 style="font-size:20px;margin-bottom:16px">解码方法</h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px">
            <div style="background:var(--card-bg);border-radius:var(--radius-sm);padding:20px;text-align:center;box-shadow:var(--shadow)">
                <div style="font-size:28px;margin-bottom:8px">1️⃣</div>

<div class="toast" id="toast"></div>

<script>
(function () {
    'use strict';

    const uploadZone = document.getElementById('upload-zone');
    const fileInput = document.getElementById('file-input');
    const previewArea = document.getElementById('preview-area');
    const previewImg = document.getElementById('preview-img');
    const decodeBtn = document.getElementById('decode-btn');
    const resultArea = document.getElementById('result-area');
    const loading = document.getElementById('loading');
    const toast = document.getElementById('toast');

    let selectedFile = null;

    // ===== Upload =====
    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });
    uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('dragover');
    });
    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) handleFile(files[0]);
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
        if (!file.type.match(/image\/(png|jpeg|jpg|webp)/)) {
            showToast('⚠️ 请上传 PNG 或 JPG 格式的图片');
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            showToast('⚠️ 图片大小不能超过 10MB');
            return;
        }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = function (e) {
            previewImg.src = e.target.result;
            previewArea.classList.add('visible');
            decodeBtn.classList.add('visible');
            resultArea.classList.remove('visible');
            showToast('✅ 图片已加载');
        };
        reader.readAsDataURL(file);
    }

    // ===== Decode =====
    decodeBtn.addEventListener('click', decodeQR);

    function decodeQR() {
        if (!selectedFile) { showToast('请先上传二维码图片'); return; }

        loading.classList.add('visible');
        decodeBtn.classList.remove('visible');
        resultArea.classList.remove('visible');

        const reader = new FileReader();
        reader.onload = function (e) {
            const img = new Image();
            img.onload = function () {
                // Draw on canvas
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert',
                });

                loading.classList.remove('visible');

                if (code && code.data) {
                    showResult(code.data);
                } else {
                    // Try with inversion
                    const code2 = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: 'attemptBoth',
                    });
                    if (code2 && code2.data) {
                        showResult(code2.data);
                    } else {
                        showError('未能识别出二维码内容。请尝试：<br>• 确保图片清晰、光线充足<br>• 二维码没有破损或变形<br>• 换一张更清晰的图片');
                    }
                }
            };
            img.onerror = function () {
                loading.classList.remove('visible');
                showError('图片加载失败，请重试');
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(selectedFile);
    }

    function showResult(data) {
        const isUrl = /^https?:\/\//i.test(data);
        resultArea.innerHTML = `
            <div class="result-card">
                <div class="label">✅ 解码成功！识别结果：</div>
                <div class="content">${escapeHtml(data)}</div>
                <div class="result-actions">
                    <button class="copy-btn" onclick="copyResult('${escapeHtml(data).replace(/'/g, "\\'")}')">📋 复制内容</button>
                    ${isUrl ? `<a href="${escapeHtml(data)}" target="_blank" rel="noopener" class="visit-btn">🔗 打开链接</a>` : ''}
                </div>
            </div>
        `;
        resultArea.classList.add('visible');
        decodeBtn.classList.add('visible');
    }

    function showError(msg) {
        resultArea.innerHTML = `<div class="error-card"><div class="label">❌ 解码失败</div><div style="font-size:14px">${msg}</div></div>`;
        resultArea.classList.add('visible');
        decodeBtn.classList.add('visible');
    }

    window.copyResult = function (text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制到剪贴板'));
        } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✅ 已复制到剪贴板');
        }
    };

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
    }
})();
</script>
